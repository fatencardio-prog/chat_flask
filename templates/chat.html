<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Chat privé</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <h2>Chat privé</h2>

    <!-- Zone de connexion -->
    <div id="login">
        <label>Pseudo :</label>
        <input id="pseudo" autocomplete="off"><br><br>

        <label>Code d'accès (salon) :</label>
        <input id="room" autocomplete="off" placeholder="ex: amiX ou amiY"><br><br>

        <button onclick="joinRoom()">Entrer</button>
    </div>

    <hr>

    <!-- Zone de chat -->
    <div id="chat" style="display:none;">
        <div id="info"></div>
        <div id="messages" style="border:1px solid #ccc;height:300px;overflow:auto;margin-bottom:10px;"></div>

        <input id="message" autocomplete="off" placeholder="Votre message">
        <button onclick="sendMessage()">Envoyer</button>
    </div>

<script>
    const socket = io();

    let pseudo = "";
    let roomCode = "";

    socket.on("message", (msg) => {
        const div = document.getElementById("messages");
        const p = document.createElement("p");
        p.textContent = msg;
        div.appendChild(p);
        div.scrollTop = div.scrollHeight;
    });

    function joinRoom() {
        pseudo = document.getElementById("pseudo").value.trim() || "Anonyme";
        roomCode = document.getElementById("room").value.trim();

        if (!roomCode) {
            alert("Merci de renseigner un code d'accès (salon).");
            return;
        }

        socket.emit("join", { pseudo: pseudo, room: roomCode });

        document.getElementById("login").style.display = "none";
        document.getElementById("chat").style.display = "block";
        document.getElementById("info").textContent =
            "Connecté en tant que " + pseudo + " dans le salon (code) : " + roomCode;
    }

    function sendMessage() {
        const input = document.getElementById("message");
        const text = input.value.trim();
        if (text) {
            const msg = pseudo + " : " + text;
            socket.emit("chat_message", {
                msg: msg,
                room: roomCode
            });
            input.value = "";
        }
    }

    document.getElementById("message").addEventListener("keyup", (e) => {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
</script>
</body>
</html>
