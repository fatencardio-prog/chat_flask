<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat privé</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #chat-container {
            max-width: 600px;
            margin: 0 auto;
        }
        #messages {
            border: 1px solid #ccc;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 10px;
            background-color: #f9f9f9;
        }
        #input-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #message-input {
            width: 100%;
            resize: vertical;
        }
        #buttons-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }
        #send-button {
            padding: 8px 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        #send-button:hover {
            background-color: #0056b3;
        }
        #filemail-button {
            padding: 8px 14px;
            background-color: red;
            color: white;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
        #filemail-button:hover {
            background-color: #b30000;
        }
    </style>
</head>
<body>
<div id="chat-container">
    <h2>Chat privé</h2>
    <p>Connecté en tant que {{ username }} dans le salon (code) : {{ room }}</p>

    <div id="messages">
        <!-- Ici tu affiches éventuellement l'historique -->
        {% for msg in messages %}
            <div><strong>{{ msg.user }} :</strong> {{ msg.text }}</div>
        {% endfor %}
    </div>

    <div id="input-area">
        <textarea id="message-input"
                  rows="3"
                  placeholder="Votre message (Entrée = nouvelle ligne)"></textarea>

        <div id="buttons-row">
            <!-- Bouton rouge vers Filemail -->
            <a id="filemail-button"
               href="https://www.filemail.com/fr"
               target="_blank"
               rel="noopener noreferrer">
                Envoyer un fichier
            </a>

            <!-- Bouton d'envoi du chat -->
            <button id="send-button">Envoyer</button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"
        integrity="sha384-hegB+o5uhkOCoFQpW4uu4utaJKQcdZG2jybZ5FQ7Htd6VFH4++HhmocA6C4O9aQX"
        crossorigin="anonymous"></script>
<script>
    const socket = io();

    const room = "{{ room }}";
    const username = "{{ username }}";

    const messagesDiv = document.getElementById('messages');
    const textarea = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-button');

    // Rejoindre la room
    socket.emit('join', {room: room, username: username});

    // Réception des messages
    socket.on('message', function (data) {
        const div = document.createElement('div');
        div.innerHTML = '<strong>' + data.user + ' :</strong> ' + data.text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // Envoi du message avec le bouton
    sendBtn.addEventListener('click', function () {
        const text = textarea.value.trim();
        if (!text) return;
        socket.emit('send_message', {room: room, username: username, text: text});
        textarea.value = '';
    });

    // Ctrl+Enter pour envoyer, Enter seul = nouvelle ligne
    textarea.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && e.ctrlKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });
</script>
</body>
</html>
