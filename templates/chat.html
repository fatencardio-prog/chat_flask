<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Chat privé</title>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"
            integrity="sha384-aFfAzlM8ql5zzctT1I3GfZt1Qq1Lrj2H9kU0heYdZ2VN3w9uQ2R5F1vJ9G8f3Zk"
            crossorigin="anonymous"></script> <!-- [web:149] -->

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
        }

        #login, #chat {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
        }

        #messages {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 10px;
            padding: 5px;
            background-color: #f9f9f9;
        }

        #message {
            width: 100%;
            box-sizing: border-box;
        }

        button {
            margin-top: 5px;
            padding: 6px 12px;
        }
    </style>
</head>
<body>

<div id="login">
    <h2>Connexion au salon</h2>

    <label>Pseudo :</label><br>
    <input type="text" id="pseudo" placeholder="Votre pseudo"><br><br>

    <label>Code d'accès au salon :</label><br>
    <input type="text" id="room" placeholder="Code du salon"><br><br>

    <button onclick="joinRoom()">Entrer dans le salon</button>
</div>

<div id="chat" style="display:none;">
    <div id="info" style="margin-bottom:10px;"></div>

    <div id="messages"></div>

    <textarea id="message" rows="4" placeholder="Votre message (Entrée = nouvelle ligne)"></textarea><br>
    <button onclick="sendMessage()">Envoyer</button>
</div>

<script src="https://cdn.socket.io/4.8.3/socket.io.min.js"
        integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0"
        crossorigin="anonymous"></script>
</body>
</html>
